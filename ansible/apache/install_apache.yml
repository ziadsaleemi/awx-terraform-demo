---
- name: Configure Apache on provisioned vSphere VM
  hosts: all
  gather_facts: false
  become: true

  vars:
    apache_package_by_os:
      Debian: apache2
      RedHat: httpd
      Suse: apache2
    apache_service_by_os:
      Debian: apache2
      RedHat: httpd
      Suse: apache2

  pre_tasks:
    - name: Wait for SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        sleep: 10
        timeout: 600

    - name: Gather facts after the host is reachable
      ansible.builtin.setup:

  tasks:
    - name: Select Apache package and service
      ansible.builtin.set_fact:
        apache_package: "{{ apache_package_by_os.get(ansible_facts.os_family, 'httpd') }}"
        apache_service: "{{ apache_service_by_os.get(ansible_facts.os_family, 'httpd') }}"

    - name: Install Apache package
      ansible.builtin.package:
        name: "{{ apache_package }}"
        state: present

    - name: Publish AWX demo page
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"
        content: |
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>AWX vSphere Apache demo</title>
          </head>
          <body>
            <h1>AWX vSphere Apache demo</h1>
            <p>Provisioned by Terraform and configured by AWX.</p>
            <p>Host: {{ inventory_hostname }}</p>
          </body>
          </html>

    - name: Enable and start Apache
      ansible.builtin.service:
        name: "{{ apache_service }}"
        enabled: true
        state: started

    - name: Verify Apache responds locally
      ansible.builtin.uri:
        url: http://127.0.0.1/
        return_content: false
        status_code: 200
